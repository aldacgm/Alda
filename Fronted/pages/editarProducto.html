<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Editar Producto</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body class="productos-theme">

    <div class="container">

        <h1>Editar Producto 🚀</h1>

        <form id="formEditar">

            <div class="form-group">

                <label>Nombre</label>

                <input
                    type="text"
                    id="nombre"
                >

            </div>

            <div class="form-group">

                <label>Descripción</label>

                <input
                    type="text"
                    id="descripcion"
                >

            </div>

            <div class="form-group">

                <label>Precio</label>

            <input
                type="number"
                id="precio"
                step="0.01"
                placeholder="Ingrese precio"
            >

            </div>

            <div class="form-group">

                <label>Stock</label>

                <input
                    type="number"
                    id="stock"
                >

            </div>

            <div class="form-group">

                <label>Marca</label>

                <input
                    type="text"
                    id="marca"
                >

            </div>

            <div class="form-group">

                <label>Categoría</label>

                <input
                    type="number"
                    id="categoria"
                >

            </div>

            <div class="form-actions">

                <button class="btn" type="submit">
                    Actualizar Producto
                </button>

            </div>

        </form>

    </div>

    <script src="../js/editarProducto.js"></script>

</body>

</html>
