<!DOCTYPE html>
<html lang="es">
<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Crear Familia</title>

    <link rel="stylesheet" href="../css/style.css">

</head>

<body class="categorias-theme">

    <div class="container fade-in">

        <h1>✏️ Nueva familia terapéutica </h1>

        <form id="formCategoria">

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="nombre" placeholder="Ingrese nombre">
            </div>

            <div class="form-group">
                <label>Descripción</label>
                <input type="text" id="descripcion" placeholder="Ingrese descripción">
            </div>

            <div class="form-group">
                <label>Estado</label>
                <input type="text" id="estado" placeholder="ACTIVO">
            </div>

            <div class="form-actions">
                <button class="btn" type="submit">
                    Guardar Familia
                </button>
            </div>

        </form>

    </div>

    <script src="../js/crearCategoria.js"></script>

</body>
</html>
